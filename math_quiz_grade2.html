<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Quiz — Grade 2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f0; min-height: 100vh; padding: 2rem 1rem; }
  #quiz-wrap { max-width: 700px; margin: auto; }
  .quiz-header { text-align: center; margin-bottom: 1.5rem; }
  .quiz-header h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .quiz-header p { font-size: 15px; color: #555; }
  .progress-bar-wrap { background: #d4e8d4; border-radius: 99px; height: 12px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar { height: 12px; border-radius: 99px; background: #1D9E75; transition: width 0.5s ease; }
  .question-card { background: #fff; border: 1.5px solid #d0e8d8; border-radius: 16px; padding: 1.75rem; margin-bottom: 1rem; box-shadow: 0 3px 12px rgba(0,0,0,0.07); }
  .topic-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 99px; margin-bottom: 14px; background: #E1F5EE; color: #0F6E56; letter-spacing: 0.03em; text-transform: uppercase; }
  .badge-fillin { background: #EEF0FF; color: #3C3489; }
  .question-text { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.25rem; line-height: 1.5; }
  .stacked-wrap { display: flex; justify-content: center; margin: 0 0 1.6rem; }
  .stacked { display: inline-block; font-family: 'Courier New', monospace; font-size: 38px; font-weight: 700; color: #1a1a1a; line-height: 1.35; background: #f8fbf8; border: 1.5px solid #d0e8d8; border-radius: 14px; padding: 18px 32px 18px 24px; min-width: 160px; }
  .stacked .row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
  .stacked .op { min-width: 28px; text-align: center; }
  .stacked .op.minus { color: #c0392b; }
  .stacked .op.plus  { color: #1D9E75; }
  .stacked .num { text-align: right; letter-spacing: 3px; }
  .stacked .divider { border: none; border-top: 3px solid #333; margin: 6px 0; width: 100%; }
  .stacked .blank { text-align: right; color: #bbb; letter-spacing: 6px; min-width: 90px; }
  .sentence-wrap { display: flex; justify-content: center; margin: 0 0 1.6rem; }
  .number-sentence { display: inline-flex; align-items: center; gap: 14px; font-family: 'Courier New', monospace; font-size: 34px; font-weight: 700; color: #1a1a1a; background: #f8fbf8; border: 1.5px solid #d0e8d8; border-radius: 14px; padding: 18px 28px; flex-wrap: wrap; justify-content: center; }
  .ns-op { color: #1D9E75; }
  .ns-op.minus { color: #c0392b; }
  .ns-blank { display: inline-block; min-width: 60px; border-bottom: 4px solid #534AB7; text-align: center; padding-bottom: 4px; color: #534AB7; }
  .numline-wrap { margin: 4px 0 20px; overflow-x: auto; padding: 6px 0 2px; background: #f8fbf8; border-radius: 10px; border: 1px solid #d8edd8; }
  .numline-wrap svg { display: block; min-width: 380px; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .option-btn { background: #f5f8f5; border: 1.5px solid #c8ddc8; border-radius: 12px; padding: 16px 12px; font-size: 16px; font-weight: 600; color: #1a1a1a; cursor: pointer; text-align: center; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .option-btn:hover:not(:disabled) { background: #e2f2e8; border-color: #1D9E75; transform: translateY(-1px); }
  .option-btn.correct { background: #E1F5EE; border-color: #0F6E56; color: #085041; }
  .option-btn.wrong   { background: #FDEAEA; border-color: #c0392b; color: #5a1010; }
  .option-btn:disabled { cursor: default; transform: none; }
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 15px; font-weight: 600; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #E1F5EE; color: #085041; border-left: 4px solid #0F6E56; }
  .feedback.wrong   { background: #FDEAEA; color: #5a1010; border-left: 4px solid #c0392b; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
  .q-counter { font-size: 13px; color: #888; font-weight: 500; }
  .next-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .next-btn:hover:not(:disabled) { background: #0F6E56; transform: translateY(-1px); }
  .next-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
  .score-card { text-align: center; padding: 3rem 1rem; background: #fff; border: 1.5px solid #d0e8d8; border-radius: 16px; box-shadow: 0 3px 12px rgba(0,0,0,0.07); }
  .score-num { font-size: 60px; font-weight: 700; color: #1D9E75; }
  .score-msg { font-size: 24px; font-weight: 700; color: #1a1a1a; margin: 8px 0 6px; }
  .score-label { font-size: 16px; color: #555; margin-bottom: 1.75rem; }
  .restart-btn { background: #1D9E75; color: #fff; border: none; border-radius: 12px; padding: 14px 40px; font-size: 17px; font-weight: 700; cursor: pointer; }
  .restart-btn:hover { background: #0F6E56; }
  .stars { font-size: 40px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="quiz-wrap">
  <div class="quiz-header">
    <h1>&#x1F522; Math Quiz &mdash; Grade 2</h1>
    <p>Addition, Subtraction &amp; Number Lines</p>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="prog" style="width:0%"></div></div>
  <div id="q-area"></div>
</div>
<script>
var questions = [
  {topic:"Sums Using a Number Line", q:"Start at 5. Jump 4 steps forward. Where do you land?", opts:["7","8","9","10"], ans:2, line:{start:5,jump:4,dir:1}},
  {topic:"Differences Using a Number Line", q:"Start at 10. Jump 3 steps back. Where do you land?", opts:["5","6","7","8"], ans:2, line:{start:10,jump:3,dir:-1}},
  {topic:"Sums Using a Number Line", q:"Start at 8. Jump 6 steps forward. Where do you land?", opts:["12","13","14","16"], ans:2, line:{start:8,jump:6,dir:1}},
  {topic:"Differences Using a Number Line", q:"Start at 15. Jump 5 steps back. Where do you land?", opts:["8","9","10","11"], ans:2, line:{start:15,jump:5,dir:-1}},
  {topic:"Sums Using a Number Line", q:"Start at 3. Jump 7 steps forward. Where do you land?", opts:["8","9","10","11"], ans:2, line:{start:3,jump:7,dir:1}},
  {topic:"Differences Using a Number Line", q:"Start at 12. Jump 4 steps back. Where do you land?", opts:["6","7","8","9"], ans:2, line:{start:12,jump:4,dir:-1}},
  {topic:"Add and Subtract up to 100", q:"What is the answer?", opts:["72","81","82","92"], ans:2, stacked:{top:47,bottom:35,op:"+"}},
  {topic:"Add and Subtract up to 1,000", q:"What is the answer?", opts:["776","786","796","886"], ans:1, stacked:{top:325,bottom:461,op:"+"}},
  {topic:"Add and Subtract up to 100", q:"What is the answer?", opts:["25","35","38","45"], ans:1, stacked:{top:63,bottom:28,op:"-"}},
  {topic:"Subtract Hundreds", q:"What is the answer?", opts:["400","500","600","700"], ans:1, stacked:{top:800,bottom:300,op:"-"}},
  {topic:"Subtract Hundreds", q:"What is the answer?", opts:["200","300","400","500"], ans:1, stacked:{top:700,bottom:400,op:"-"}},
  {topic:"Subtract 3-Digit Numbers", q:"What is the answer?", opts:["323","333","343","353"], ans:1, stacked:{top:456,bottom:123,op:"-"}},
  {topic:"Break Apart to Subtract (Regrouping)", q:"What is the answer?", opts:["154","164","174","184"], ans:1, stacked:{top:312,bottom:148,op:"-"}},
  {topic:"Add and Subtract up to 1,000", q:"What is the answer?", opts:["515","525","535","545"], ans:1, stacked:{top:740,bottom:215,op:"-"}},
  {topic:"Complete the Number Sentence", badge:"fillin", q:"What number goes in the blank?", sentence:{left:300,op:"-",blank:"right",eq:200}, opts:["80","90","100","110"], ans:2},
  {topic:"Complete the Number Sentence", badge:"fillin", q:"What number goes in the blank?", sentence:{left:54,op:"+",blank:"right",eq:80}, opts:["24","26","28","30"], ans:1},
  {topic:"Complete the Number Sentence", badge:"fillin", q:"What number goes in the blank?", sentence:{blank:"left",op:"+",right:47,eq:90}, opts:["33","41","43","53"], ans:2},
  {topic:"Complete the Number Sentence", badge:"fillin", q:"What number goes in the blank?", sentence:{left:500,op:"-",blank:"right",eq:350}, opts:["100","150","200","250"], ans:1},
  {topic:"Complete the Number Sentence", badge:"fillin", q:"What number goes in the blank?", sentence:{blank:"left",op:"-",right:38,eq:25}, opts:["53","61","63","73"], ans:2},
  {topic:"Solve Word Problems by Adding", q:"Maria has 24 apples. Tom gives her 18 more. How many apples does Maria have now?", opts:["38","40","42","44"], ans:2},
  {topic:"Problem Solve: Write a Number Sentence", q:"There are 15 birds. 6 fly away. Which number sentence shows this?", opts:["15 + 6 = ?","15 \u2212 6 = ?","6 + ? = 15","6 \xd7 15 = ?"], ans:1},
  {topic:"Input/Output Tables: Add", q:"Rule: Add 9. Input is 13. What is the output?", opts:["19","21","22","23"], ans:2},
  {topic:"Input/Output Tables: Subtract", q:"Rule: Subtract 7. Input is 20. What is the output?", opts:["11","12","13","14"], ans:2},
  {topic:"Problem Solve Using Pictures", q:"A picture shows 3 groups of 10 apples plus 5 extra apples. How many apples are there?", opts:["30","35","40","45"], ans:1},
  {topic:"Solve Word Problems by Adding", q:"A school has 236 students. 104 more students join. How many students are there now?", opts:["330","340","350","360"], ans:1}
];

var current=0, score=0, answered=false, shuffled=[];

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function buildStacked(s){
  var oc=s.op==='-'?'minus':'plus';
  var os=s.op==='-'?'&minus;':'+';
  return '<div class="stacked-wrap"><div class="stacked">'+
    '<div class="row"><span class="op">&nbsp;</span><span class="num">'+s.top+'</span></div>'+
    '<div class="row"><span class="op '+oc+'">'+os+'</span><span class="num">'+s.bottom+'</span></div>'+
    '<hr class="divider"/>'+
    '<div class="row"><span class="op">&nbsp;</span><span class="blank">?</span></div>'+
    '</div></div>';
}

function buildSentence(s){
  var oc=s.op==='-'?'minus':'';
  var os=s.op==='-'?'&minus;':'+';
  var blankEl='<span class="ns-blank">?</span>';
  var leftEl =s.blank==='left' ? blankEl : '<span>'+s.left+'</span>';
  var rightEl=s.blank==='right'? blankEl : '<span>'+s.right+'</span>';
  return '<div class="sentence-wrap"><div class="number-sentence">'+
    leftEl+'<span class="ns-op '+oc+'">'+os+'</span>'+rightEl+
    '<span style="color:#555">=</span><span>'+s.eq+'</span>'+
    '</div></div>';
}

function buildLine(cfg){
  var start=cfg.start,jump=cfg.jump,dir=cfg.dir;
  var end=start+dir*jump;
  var lo=Math.min(start,end)-2, hi=Math.max(start,end)+2;
  var count=hi-lo;
  var PAD_L=44,PAD_R=44,W=620;
  var step=(W-PAD_L-PAD_R)/count;
  var CY=48,H=88;
  function xOf(n){return PAD_L+(n-lo)*step;}
  var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<defs><marker id="axl" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M9 1L1 5L9 9" fill="none" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>';
  svg+='<marker id="axr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
  svg+='<line x1="'+(PAD_L-18)+'" y1="'+CY+'" x2="'+(W-PAD_R+18)+'" y2="'+CY+'" stroke="#555" stroke-width="2.2" marker-start="url(#axl)" marker-end="url(#axr)"/>';
  for(var n=lo;n<=hi;n++){
    var x=xOf(n);
    var isS=(n===start);
    svg+='<line x1="'+x+'" y1="'+(CY-(isS?13:8))+'" x2="'+x+'" y2="'+(CY+(isS?13:8))+'" stroke="'+(isS?'#BA7517':'#777')+'" stroke-width="'+(isS?2.5:1.5)+'" stroke-linecap="round"/>';
    svg+='<text x="'+x+'" y="'+(CY+26)+'" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="'+(isS?15:13)+'" font-weight="'+(isS?'700':'400')+'" fill="'+(isS?'#7a4d00':'#444')+'">'+n+'</text>';
  }
  svg+='<circle cx="'+xOf(start)+'" cy="'+CY+'" r="7" fill="#FAC775" stroke="#BA7517" stroke-width="2.5"/>';
  svg+='<text x="'+xOf(start)+'" y="'+(CY-18)+'" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#8a5500">start</text>';
  svg+='</svg>';
  return svg;
}

function renderQ(){
  var q=shuffled[current];
  document.getElementById('prog').style.width=Math.round((current/shuffled.length)*100)+'%';
  var vis='';
  if(q.stacked) vis=buildStacked(q.stacked);
  else if(q.sentence) vis=buildSentence(q.sentence);
  else if(q.line) vis='<div class="numline-wrap">'+buildLine(q.line)+'</div>';
  var bc=q.badge==='fillin'?'badge-fillin':'';
  var opts=q.opts.map(function(o,i){return '<button class="option-btn" onclick="choose('+i+')">'+o+'</button>';}).join('');
  document.getElementById('q-area').innerHTML=
    '<div class="question-card">'+
    '<div class="topic-badge '+bc+'">'+q.topic+'</div>'+
    '<div class="question-text">'+q.q+'</div>'+
    vis+
    '<div class="options">'+opts+'</div>'+
    '<div class="feedback" id="fb"></div>'+
    '</div>'+
    '<div class="nav-row">'+
    '<span class="q-counter">Question '+(current+1)+' of '+shuffled.length+'</span>'+
    '<button class="next-btn" id="nxt" onclick="next()" disabled>Next &rarr;</button>'+
    '</div>';
  answered=false;
}

function choose(i){
  if(answered)return;
  answered=true;
  var q=shuffled[current];
  var btns=document.querySelectorAll('.option-btn');
  var fb=document.getElementById('fb');
  btns.forEach(function(b){b.disabled=true;});
  if(i===q.ans){
    score++;
    btns[i].classList.add('correct');
    fb.textContent='\u2713 Great job! That is correct!';
    fb.className='feedback correct show';
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    fb.textContent='\u2717 Not quite! The correct answer is: '+q.opts[q.ans];
    fb.className='feedback wrong show';
  }
  document.getElementById('nxt').disabled=false;
}

function next(){
  current++;
  if(current>=shuffled.length)showScore();
  else renderQ();
}

function showScore(){
  document.getElementById('prog').style.width='100%';
  var pct=Math.round((score/shuffled.length)*100);
  var stars=pct>=90?'\u2B50\u2B50\u2B50':pct>=70?'\u2B50\u2B50':'\u2B50';
  var msg=pct>=90?'Amazing work, superstar!':pct>=70?'Good job, keep it up!':'Keep practicing, you can do it!';
  document.getElementById('q-area').innerHTML=
    '<div class="score-card">'+
    '<div class="stars">'+stars+'</div>'+
    '<div class="score-msg">'+msg+'</div>'+
    '<div class="score-num">'+score+'/'+shuffled.length+'</div>'+
    '<div class="score-label">You got '+pct+'% correct!</div>'+
    '<button class="restart-btn" onclick="restart()">\uD83D\uDD04 Try Again</button>'+
    '</div>';
}

function restart(){current=0;score=0;shuffled=shuffle(questions);renderQ();}

shuffled=shuffle(questions);
renderQ();
</script>
</body>
</html>
